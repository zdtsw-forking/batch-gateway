# Global settings (shared by apiserver and processor)
global:
  imagePullSecrets: []

  # Name of the Kubernetes Secret containing sensitive values (e.g. database URLs, API keys).
  # Shared by all components; mounted read-only at /etc/.secrets/ in each container.
  # The secret must use these exact key names (hardcoded in the application):
  #   redis-url             — Redis connection URL (e.g. redis://host:6379/0)
  #   postgresql-url        — PostgreSQL connection URL (e.g. postgresql://user:pass@host/db)
  #   inference-api-key     — API key for the inference gateway (optional; omit if not required)
  #   s3-secret-access-key  — S3 secret access key (required when file_client.type is "s3")
  # Create with: kubectl create secret generic <name> --from-literal=redis-url=redis://...
  appSecretName: "batch-gateway-secrets"

  # Database backend type: "redis", or "postgresql"
  databaseType: "postgresql"

  # OpenTelemetry configuration
  otel:
    # OTLP gRPC endpoint (e.g. "http://jaeger.default.svc.cluster.local:4317")
    # Leave empty to disable tracing.
    endpoint: ""
    # Use insecure (plaintext) gRPC connection to the collector.
    insecure: true
    # Enable per-command Redis tracing spans. Can produce high span volume
    # for batch workloads — leave disabled unless actively debugging Redis.
    redisTracing: false
    # Enable per-query PostgreSQL tracing spans via otelpgx.
    postgresqlTracing: false

  # File client configuration
  fileClient:
    type: "fs"  # Options: "fs", "s3"
    # Filesystem client configuration (required when type is "fs")
    fs:
      basePath: "/tmp/batch-gateway"
      # Name of a PersistentVolumeClaim to use for file storage.
      pvcName: ""
    # S3 client configuration (required when type is "s3")
    s3:
      region: ""
      endpoint: ""
      accessKeyID: ""
      prefix: ""
      usePathStyle: false

# API Server configuration
apiserver:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/llm-d-incubation/batch-gateway-apiserver
    pullPolicy: Always
    tag: "latest"

  nameOverride: ""
  fullnameOverride: ""

  serviceAccount:
    create: true
    automount: true
    annotations: {}
    name: ""

  podAnnotations: {}
  podLabels: {}

  # Pod security context
  # For OpenShift, set podSecurityContext: {} to use SCC-assigned UIDs
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault

  # Container security context (minimal, works with OpenShift)
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true

  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
    annotations: {}

  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  livenessProbe:
    httpGet:
      path: /health
      port: observability
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /ready
      port: observability
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  volumes: []
  volumeMounts: []
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Gateway API HTTPRoute configuration (requires Gateway API CRDs to be installed)
  # When enabled, creates an HTTPRoute to expose the Batch API endpoints
  # (/v1/batches and /v1/files) through a Gateway API-compliant gateway.
  httpRoute:
    enabled: false
    annotations: {}
    # parentRefs define which Gateway(s) this HTTPRoute attaches to.
    parentRefs:
      - name: "llm-d-inference-gateway"
        # Namespace of the parent Gateway. Leave empty to use the release namespace.
        namespace: ""
        # Section on the Gateway to attach to (e.g. a specific listener name).
        sectionName: ""

  # Application configuration
  config:
    host: ""
    port: "8000"
    observabilityPort: "8081"
    tenantHeader: "X-MaaS-Username"
    readHeaderTimeoutSeconds: 10
    readTimeoutSeconds: 900
    writeTimeoutSeconds: 120
    idleTimeoutSeconds: 90
    batchAPI:
      batchEventTTLSeconds: 2592000
      passThroughHeaders: []
    fileAPI:
      defaultExpirationSeconds: 7776000
      maxSizeBytes: 209715200
      maxLineCount: 50000

  # TLS/SSL Configuration
  tls:
    enabled: false
    secretName: ""
    certManager:
      enabled: false
      issuerName: ""
      issuerKind: ClusterIssuer
      dnsNames: []

  # Logging configuration
  logging:
    verbosity: 2

# Processor configuration
processor:
  enabled: true
  replicaCount: 1
  terminationGracePeriodSeconds: 60

  workDirVolume:
    sizeLimit: "10Gi"
    medium: "" # node disk

  image:
    repository: ghcr.io/llm-d-incubation/batch-gateway-processor
    pullPolicy: Always
    tag: "latest"

  nameOverride: ""
  fullnameOverride: ""

  serviceAccount:
    create: true
    automount: true
    annotations: {}
    name: ""

  podAnnotations: {}
  podLabels: {}

  # Pod security context
  # For OpenShift, set podSecurityContext: {} to use SCC-assigned UIDs
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault

  # Container security context (minimal, works with OpenShift)
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true

  resources:
    limits:
      cpu: 2000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

  livenessProbe:
    httpGet:
      path: /health
      port: metrics
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /ready
      port: metrics
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  volumes: []
  volumeMounts: []
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Processor specific configuration
  config:
    addr: ":9090"
    taskWaitTime: "1s"
    pollInterval: "5s"
    numWorkers: 20
    globalConcurrency: 100
    perModelMaxConcurrency: 10
    queueTimeBucket:
      bucketStart: 0.1
      bucketFactor: 2
      bucketCount: 10
    processTimeBucket:
      bucketStart: 0.1
      bucketFactor: 2
      bucketCount: 15
    terminateOnObservabilityFailure: false
    shutdownTimeout: "30s"
    workDir: "/var/lib/batch-gateway/processor"
    # modelGateways.default is required and acts as fallback for all models.
    # Lookup order: modelGateways[model] -> modelGateways["default"].
    # Each model name maps to exactly one gateway config (one entry per model).
    # apiKeyName is a key name in the app secret (mounted at /etc/.secrets/).
    # When omitted, the default inference-api-key is used.
    # Per-model entries must be fully specified — HTTP fields are NOT inherited from "default".
    modelGateways:
      "default":
        url: "http://localhost:8000"
        requestTimeout: "5m"
        maxRetries: 3
        initialBackoff: "1s"
        maxBackoff: "60s"
        tlsInsecureSkipVerify: false
      # Per-model entries (optional, all HTTP fields required):
      # "llama-3":
      #   url: "http://gateway-a:8000"
      #   requestTimeout: "5m"
      #   maxRetries: 3
      #   initialBackoff: "1s"
      #   maxBackoff: "60s"
      # "mistral":
      #   url: "http://gateway-b:8000"
      #   apiKeyName: "gateway-b-api-key"
      #   requestTimeout: "2m"
      #   maxRetries: 1
      #   initialBackoff: "1s"
      #   maxBackoff: "30s"
    uploadRetry:
      maxRetries: 3
      initialBackoff: "1s"
      maxBackoff: "10s"
    defaultOutputExpirationSeconds: 7776000  # 90 days
    progressTTLSeconds: 86400  # 24 hours

  # Logging configuration
  logging:
    verbosity: 2
