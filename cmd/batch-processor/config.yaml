# Worker Settings - task wait time needs to be shorter than poll interval
task_wait_time: "1s"
poll_interval: "5s"
num_workers: 20
queue_time_bucket:
  bucket_start: 0.1
  bucket_factor: 2
  bucket_count: 10
process_time_bucket:
  bucket_start: 0.1
  bucket_factor: 2
  bucket_count: 15

# Concurrency Control
global_concurrency: 100
per_model_max_concurrency: 10

# Metrics & Health Check Server Address - ":PORT" format (e.g. ":9090")
addr: ":9090"
# Observability server failure should not terminate the processor in best-effort mode by default.
terminate_on_observability_failure: false

# Shutdown timeout for processor (should be less than k8s terminationGracePeriodSeconds)
shutdown_timeout: "30s"

# Work directory for processor
work_dir: "/var/lib/batch-gateway/processor"

# Model-specific inference gateway configuration.
# Reserved key "default" is required and acts as the fallback for all models.
# Lookup order: model_gateways[model] -> model_gateways["default"].
# api_key_name is a key name in /etc/.secrets/; when omitted, the default
# inference-api-key secret is used.
model_gateways:
  "default":
    url: "http://localhost:8000"
    request_timeout: "5m"
    max_retries: 3
    initial_backoff: "1s"
    max_backoff: "60s"
    tls_insecure_skip_verify: false
    # tls_ca_cert_file: "/path/to/ca-cert.pem"
    # tls_client_cert_file: "/path/to/client-cert.pem"
    # tls_client_key_file: "/path/to/client-key.pem"
  # Per-model entries (optional). Each entry must be fully specified —
  # all HTTP fields are required and are NOT inherited from "default".
  # "llama-3":
  #   url: "http://gateway-a:8000"
  #   request_timeout: "5m"
  #   max_retries: 3
  #   initial_backoff: "1s"
  #   max_backoff: "60s"
  # "mistral":
  #   url: "http://gateway-b:8000"
  #   api_key_name: "gateway-b-api-key"
  #   request_timeout: "2m"
  #   max_retries: 1
  #   initial_backoff: "1s"
  #   max_backoff: "30s"

# Default TTL for output/error files in seconds (0 = no expiration).
# Used as fallback when the user does not provide output_expires_after in POST /v1/batches.
default_output_expiration_seconds: 7776000  # 90 days

# TTL for temporary progress updates in the status store (Redis), in seconds.
progress_ttl_seconds: 86400  # 24 hours

# Retry configuration for uploading output files to shared storage
upload_retry:
  max_retries: 3
  initial_backoff: "1s"
  max_backoff: "10s"
